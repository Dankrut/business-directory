services:
  guide_db:
    image: postgres:16
    container_name: "guide_db"
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user123
      POSTGRES_DB: guide
    ports:
      - "5433:5432"  # Проброс на 5433, чтобы не конфликтовать с локальной БД
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - guide_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d guide"]
      interval: 5s
      timeout: 5s
      retries: 5

  guide_back_service:
    container_name: "guide_back"
    build:
      context: .
    ports:
      - "8000:8000"
    networks:
      - guide_network
    env_file:
      - .env
    depends_on:
      guide_db:
        condition: service_healthy

networks:
  guide_network:
    driver: bridge

volumes:
  postgres_data: